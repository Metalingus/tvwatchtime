services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: ghcr.io/metalingus/tvwatch-api:latest
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - api-storage:/app/apps/api/storage
    networks: [internal]

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    image: ghcr.io/metalingus/tvwatch-admin:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_URL: https://api.tvwatchtime.org/api
    networks: [internal]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    command: >
      postgres
      -c shared_buffers=${POSTGRES_SHARED_BUFFERS:-256MB}
      -c max_connections=${POSTGRES_MAX_CONNECTIONS:-100}
      -c effective_cache_size=${POSTGRES_CACHE_SIZE:-1GB}
      -c work_mem=${POSTGRES_WORK_MEM:-4MB}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [internal]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [internal]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    networks: [internal]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./public-site:/srv/public-site:ro
      - ./app-web:/srv/app-web:ro
      - caddydata:/data
      - caddyconfig:/config
    networks: [internal]

  # ───────────────────────────────────────────────────────────────────────────
  # OPTIONAL metadata stack (Jikan self-host). Enabled with: docker compose --profile metadata up
  # The API starts and operates WITHOUT this stack; Jikan is a fallback provider.
  # NEVER added to `api.depends_on`. No public Caddy route.
  # ⚠ Image tag / port / health endpoint below are UNVERIFIED EXAMPLES — confirm against the
  #    current official Jikan self-host setup (jikan-me/jikan-rest) before production use, and
  #    run the multi-day indexer (`execute-indexers`) as an explicit operator action only.
  # ───────────────────────────────────────────────────────────────────────────
  jikan:
    image: jikanme/jikan-rest:latest   # VERIFY tag
    profiles: ["metadata"]
    restart: unless-stopped
    env_file: .env.prod
    environment:
      # Point Jikan at its dependencies on the internal network (VERIFY variable names).
      MONGODB_HOST: mongodb
      REDIS_HOST: redis
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      # VERIFY the exact health plugin/port for the selected image.
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:2114/health?plugin=http || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - jikandata:/app/storage
    networks: [internal]

  mongodb:
    image: mongo:7            # VERIFY required version
    profiles: ["metadata"]
    restart: unless-stopped
    command: "--wiredTigerCacheSizeGB ${MONGO_CACHE_SIZE_GB:-1.0}"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${JIKAN_DB_USERNAME:-jikan}
      MONGO_INITDB_ROOT_PASSWORD: ${JIKAN_DB_PASSWORD:-jikan}
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand(\"ping\").ok'"]
      interval: 20s
      timeout: 10s
      retries: 5
    networks: [internal]

volumes:
  pgdata:
  redisdata:
  miniodata:
  api-storage:
  caddydata:
  caddyconfig:
  jikandata:
  mongodata:

networks:
  internal: