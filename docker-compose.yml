services:
  postgres:
    image: postgres:16-alpine
    container_name: tvwatch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tvwatch
      POSTGRES_PASSWORD: tvwatch
      POSTGRES_DB: tvwatch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tvwatch"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tvwatch-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional local object storage for avatars/covers in dev
  minio:
    image: minio/minio:latest
    container_name: tvwatch-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: tvwatch
      MINIO_ROOT_PASSWORD: tvwatch123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  redisdata:
  miniodata:
