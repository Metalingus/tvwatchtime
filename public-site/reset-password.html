<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — TVWatchTime</title>
  <link rel="icon" href="/favicon.ico" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0F1115; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { max-width: 480px; width: 90%; padding: 24px; }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 { font-size: 28px; color: #FFD60A; font-weight: 800; }
    .card { background: #1A1D24; border: 1px solid #2A2D35; border-radius: 16px; padding: 32px; }
    .card h2 { font-size: 22px; margin-bottom: 8px; }
    .card p { color: rgba(255,255,255,0.6); font-size: 14px; line-height: 1.6; margin-bottom: 20px; }
    .field-wrap { position: relative; margin-bottom: 16px; }
    label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: rgba(255,255,255,0.4); margin-bottom: 6px; }
    input { width: 100%; padding: 12px 44px 12px 16px; background: #0F1115; border: 1px solid #2A2D35; border-radius: 8px; color: #fff; font-size: 16px; outline: none; }
    input:focus { border-color: #FFD60A; }
    .eye { position: absolute; right: 12px; top: 38px; cursor: pointer; font-size: 20px; opacity: 0.5; user-select: none; }
    .btn { width: 100%; padding: 14px; background: #FFD60A; color: #0F1115; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; transition: opacity .2s; }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; }
    .msg { padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; display: none; }
    .msg.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .msg.ok { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
    .success { text-align: center; }
    .success .icon { font-size: 48px; margin-bottom: 16px; }
    .success h2 { color: #22C55E; }
    .nav { text-align: center; margin-top: 24px; }
    .nav a { color: rgba(255,255,255,0.4); font-size: 13px; text-decoration: none; }
    .nav a:hover { color: #FFD60A; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><h1>TVWatchTime</h1></div>
    <div class="card" id="formCard">
      <div id="doneView" style="display:none" class="success">
        <div class="icon">✅</div>
        <h2>Password Updated</h2>
        <p style="margin-top:12px;">Your password has been changed. Open the TVWatchTime app and log in with your new password.</p>
      </div>
      <div id="resetForm">
        <h2>Reset Password</h2>
        <p>Enter your new password below.</p>
        <div class="msg" id="msgBox"></div>
        <form id="form">
          <div class="field-wrap">
            <label>New Password</label>
            <input type="password" id="password" placeholder="At least 8 characters" required minlength="8">
            <span class="eye" onclick="toggleEye('password')">👁</span>
          </div>
          <div class="field-wrap">
            <label>Confirm Password</label>
            <input type="password" id="confirm" placeholder="Re-enter password" required minlength="8">
            <span class="eye" onclick="toggleEye('confirm')">👁</span>
          </div>
          <button type="submit" class="btn" id="submitBtn">Update Password</button>
        </form>
      </div>
    </div>
    <div class="nav"><a href="/">← Back to TVWatchTime</a></div>
  </div>
  <script>
    function toggleEye(id) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
    }
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) {
      document.getElementById('resetForm').innerHTML = '<h2>Invalid Link</h2><p>This reset link is missing a token. Please request a new password reset from the app.</p>';
    }
    const API_BASE = window.location.hostname === 'tvwatchtime.org' ? 'https://api.tvwatchtime.org/api' : window.location.origin.replace(/\/\/([^\.]+)/, '//api.$1') + '/api';
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const pw = document.getElementById('password').value;
      const cf = document.getElementById('confirm').value;
      const msgBox = document.getElementById('msgBox');
      if (pw !== cf) { msgBox.className = 'msg error'; msgBox.textContent = 'Passwords do not match'; msgBox.style.display = 'block'; return; }
      const btn = document.getElementById('submitBtn');
      btn.disabled = true; btn.textContent = 'Updating...';
      msgBox.style.display = 'none';
      try {
        await fetch(`${API_BASE}/auth/reset-password`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, newPassword: pw }) });
        document.getElementById('resetForm').style.display = 'none';
        document.getElementById('doneView').style.display = 'block';
      } catch (err) {
        msgBox.className = 'msg error';
        msgBox.textContent = 'Failed to reset password. The link may be expired or invalid.';
        msgBox.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Update Password';
      }
    });
  </script>
</body>
</html>
